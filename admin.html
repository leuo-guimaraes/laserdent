<!DOCTYPE html>

<html lang="pt-BR">



<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="robots" content="noindex, nofollow">

    <title>Admin — Clínica LASERdent</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link

        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap"

        rel="stylesheet">

    <style>

        :root {

            --primary: #4AADCC;

            --primary-dark: #1B6B8A;

            --primary-light: #7CCDE3;

            --primary-glow: rgba(74, 173, 204, 0.25);

            --accent-red: #E53935;

            --white: #FFFFFF;

            --off-white: #F5F7FA;

            --gray-100: #F1F5F9;

            --gray-200: #E2E8F0;

            --gray-300: #CBD5E1;

            --gray-400: #94A3B8;

            --gray-500: #64748B;

            --gray-600: #475569;

            --gray-700: #334155;

            --gray-800: #1E293B;

            --gray-900: #0F172A;

            --dark: #1A1A2E;

            --font-heading: 'Outfit', sans-serif;

            --font-body: 'Inter', sans-serif;

            --radius-sm: 8px;

            --radius-md: 12px;

            --radius-lg: 20px;

            --radius-xl: 28px;

            --radius-full: 9999px;

            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);

            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);

            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.1);

        }



        *,

        *::before,

        *::after {

            margin: 0;

            padding: 0;

            box-sizing: border-box;

        }



        body {

            font-family: var(--font-body);

            background: var(--off-white);

            color: var(--gray-800);

            min-height: 100vh;

        }



        /* ── Login Screen ── */

        .login-screen {

            min-height: 100vh;

            display: flex;

            align-items: center;

            justify-content: center;

            background: linear-gradient(135deg, var(--dark) 0%, #1B6B8A 100%);

            padding: 24px;

        }



        .login-card {

            background: var(--white);

            border-radius: var(--radius-xl);

            padding: 48px 40px;

            max-width: 420px;

            width: 100%;

            box-shadow: var(--shadow-lg);

            text-align: center;

        }



        .login-card__logo {

            display: flex;

            align-items: center;

            justify-content: center;

            gap: 12px;

            margin-bottom: 32px;

        }



        .login-card__logo svg {

            width: 42px;

            height: 42px;

            color: var(--primary);

        }



        .login-card__logo-text {

            text-align: left;

        }



        .login-card__logo-text span:first-child {

            display: block;

            font-size: 0.65rem;

            font-weight: 500;

            text-transform: uppercase;

            letter-spacing: 3px;

            color: var(--gray-500);

        }



        .login-card__logo-text span:last-child {

            font-family: var(--font-heading);

            font-size: 1.45rem;

            font-weight: 800;

            color: var(--gray-900);

        }



        .login-card h2 {

            font-family: var(--font-heading);

            font-size: 1.5rem;

            margin-bottom: 8px;

            color: var(--gray-900);

        }



        .login-card p {

            color: var(--gray-500);

            font-size: 0.92rem;

            margin-bottom: 28px;

        }



        .login-card .form-group {

            margin-bottom: 18px;

            text-align: left;

        }



        .login-card label {

            display: block;

            font-size: 0.85rem;

            font-weight: 600;

            color: var(--gray-700);

            margin-bottom: 6px;

        }



        .login-card input {

            width: 100%;

            padding: 12px 16px;

            border: 2px solid var(--gray-200);

            border-radius: var(--radius-md);

            font-size: 0.95rem;

            font-family: var(--font-body);

            transition: border-color 0.2s;

            outline: none;

        }



        .login-card input:focus {

            border-color: var(--primary);

        }



        .login-error {

            display: none;

            color: var(--accent-red);

            font-size: 0.85rem;

            margin-bottom: 12px;

            padding: 8px 14px;

            background: rgba(229, 57, 53, 0.08);

            border-radius: var(--radius-sm);

        }



        .login-error.active {

            display: block;

        }



        .btn {

            display: inline-flex;

            align-items: center;

            justify-content: center;

            gap: 10px;

            padding: 14px 28px;

            border-radius: var(--radius-full);

            font-weight: 600;

            font-size: 0.95rem;

            border: none;

            cursor: pointer;

            font-family: var(--font-body);

            transition: all 0.3s;

            width: 100%;

        }



        .btn--primary {

            background: linear-gradient(135deg, var(--primary), var(--primary-dark));

            color: var(--white);

            box-shadow: 0 4px 16px rgba(74, 173, 204, 0.35);

        }



        .btn--primary:hover {

            transform: translateY(-2px);

            box-shadow: 0 8px 28px rgba(74, 173, 204, 0.45);

        }



        /* ── Dashboard ── */

        .dashboard {

            display: none;

        }



        .dashboard.active {

            display: block;

        }



        .dashboard__header {

            background: var(--white);

            border-bottom: 1px solid var(--gray-200);

            padding: 16px 32px;

            display: flex;

            align-items: center;

            justify-content: space-between;

            position: sticky;

            top: 0;

            z-index: 100;

        }



        .dashboard__header-left {

            display: flex;

            align-items: center;

            gap: 16px;

        }



        .dashboard__header-left svg {

            width: 32px;

            height: 32px;

            color: var(--primary);

        }



        .dashboard__header-left h1 {

            font-family: var(--font-heading);

            font-size: 1.2rem;

            color: var(--gray-900);

        }



        .dashboard__header-left span {

            font-size: 0.78rem;

            padding: 4px 12px;

            background: var(--primary-glow);

            color: var(--primary-dark);

            border-radius: var(--radius-full);

            font-weight: 600;

        }



        .btn--logout {

            padding: 8px 20px;

            font-size: 0.85rem;

            background: none;

            border: 2px solid var(--gray-200);

            color: var(--gray-600);

            border-radius: var(--radius-full);

            cursor: pointer;

            font-family: var(--font-body);

            font-weight: 500;

            transition: all 0.2s;

        }



        .btn--logout:hover {

            border-color: var(--accent-red);

            color: var(--accent-red);

        }



        .dashboard__content {

            max-width: 900px;

            margin: 32px auto;

            padding: 0 24px;

        }



        .dashboard__stats {

            display: grid;

            grid-template-columns: repeat(3, 1fr);

            gap: 20px;

            margin-bottom: 32px;

        }



        .stat-card {

            background: var(--white);

            border-radius: var(--radius-lg);

            padding: 24px;

            box-shadow: var(--shadow-sm);

        }



        .stat-card__label {

            font-size: 0.8rem;

            color: var(--gray-500);

            text-transform: uppercase;

            letter-spacing: 1px;

            margin-bottom: 8px;

        }



        .stat-card__value {

            font-family: var(--font-heading);

            font-size: 2rem;

            font-weight: 800;

            color: var(--gray-900);

        }



        .stat-card__value--pending {

            color: #F59E0B;

        }



        .stat-card__value--approved {

            color: #10B981;

        }



        .stat-card__value--rejected {

            color: var(--accent-red);

        }



        .dashboard__section {

            background: var(--white);

            border-radius: var(--radius-lg);

            box-shadow: var(--shadow-sm);

            margin-bottom: 24px;

            overflow: hidden;

        }



        .dashboard__section-header {

            padding: 20px 24px;

            border-bottom: 1px solid var(--gray-100);

            display: flex;

            align-items: center;

            justify-content: space-between;

        }



        .dashboard__section-header h2 {

            font-family: var(--font-heading);

            font-size: 1.15rem;

            color: var(--gray-900);

        }



        .filter-tabs {

            display: flex;

            gap: 4px;

        }



        .filter-tab {

            padding: 6px 16px;

            border-radius: var(--radius-full);

            font-size: 0.8rem;

            font-weight: 500;

            border: none;

            background: none;

            color: var(--gray-500);

            cursor: pointer;

            font-family: var(--font-body);

            transition: all 0.2s;

        }



        .filter-tab.active {

            background: var(--primary-glow);

            color: var(--primary-dark);

            font-weight: 600;

        }



        .filter-tab:hover:not(.active) {

            background: var(--gray-100);

        }



        .testimonial-list {

            padding: 0;

        }



        .testimonial-item {

            padding: 20px 24px;

            border-bottom: 1px solid var(--gray-100);

            transition: background 0.2s;

        }



        .testimonial-item:last-child {

            border-bottom: none;

        }



        .testimonial-item:hover {

            background: var(--gray-50, #F8FAFC);

        }



        .testimonial-item__header {

            display: flex;

            align-items: center;

            justify-content: space-between;

            margin-bottom: 10px;

        }



        .testimonial-item__author {

            display: flex;

            align-items: center;

            gap: 12px;

        }



        .testimonial-item__avatar {

            width: 40px;

            height: 40px;

            border-radius: 50%;

            background: linear-gradient(135deg, var(--primary-glow), rgba(74, 173, 204, 0.15));

            display: flex;

            align-items: center;

            justify-content: center;

            font-weight: 700;

            font-size: 0.85rem;

            color: var(--primary-dark);

        }



        .testimonial-item__name {

            font-weight: 600;

            color: var(--gray-900);

            font-size: 0.95rem;

        }



        .testimonial-item__email {

            font-size: 0.8rem;

            color: var(--gray-400);

        }



        .testimonial-item__date {

            font-size: 0.78rem;

            color: var(--gray-400);

        }



        .testimonial-item__status {

            display: inline-block;

            padding: 3px 10px;

            border-radius: var(--radius-full);

            font-size: 0.72rem;

            font-weight: 600;

            text-transform: uppercase;

            letter-spacing: 0.5px;

        }



        .testimonial-item__status--pending {

            background: rgba(245, 158, 11, 0.1);

            color: #D97706;

        }



        .testimonial-item__status--approved {

            background: rgba(16, 185, 129, 0.1);

            color: #059669;

        }



        .testimonial-item__status--rejected {

            background: rgba(229, 57, 53, 0.08);

            color: var(--accent-red);

        }



        .testimonial-item__text {

            font-size: 0.92rem;

            color: var(--gray-600);

            line-height: 1.7;

            margin-bottom: 14px;

            font-style: italic;

        }



        .testimonial-item__actions {

            display: flex;

            gap: 8px;

        }



        .btn--action {

            padding: 6px 16px;

            border-radius: var(--radius-full);

            font-size: 0.8rem;

            font-weight: 600;

            border: none;

            cursor: pointer;

            font-family: var(--font-body);

            transition: all 0.2s;

            display: inline-flex;

            align-items: center;

            gap: 6px;

        }



        .btn--approve {

            background: rgba(16, 185, 129, 0.1);

            color: #059669;

        }



        .btn--approve:hover {

            background: #10B981;

            color: var(--white);

        }



        .btn--reject {

            background: rgba(229, 57, 53, 0.08);

            color: var(--accent-red);

        }



        .btn--reject:hover {

            background: var(--accent-red);

            color: var(--white);

        }



        .btn--delete {

            background: var(--gray-100);

            color: var(--gray-500);

        }



        .btn--delete:hover {

            background: var(--gray-200);

            color: var(--gray-700);

        }



        .empty-state {

            text-align: center;

            padding: 48px 24px;

            color: var(--gray-400);

        }



        .empty-state svg {

            width: 48px;

            height: 48px;

            margin-bottom: 16px;

            opacity: 0.5;

        }



        .empty-state p {

            font-size: 0.95rem;

        }



        .back-link {

            display: inline-flex;

            align-items: center;

            gap: 6px;

            font-size: 0.85rem;

            color: var(--gray-500);

            text-decoration: none;

            margin-top: 20px;

            transition: color 0.2s;

        }



        .back-link:hover {

            color: var(--primary);

        }



        @media (max-width: 768px) {

            .dashboard__stats {

                grid-template-columns: 1fr;

            }



            .dashboard__header {

                flex-direction: column;

                gap: 12px;

                text-align: center;

            }



            .testimonial-item__header {

                flex-direction: column;

                align-items: flex-start;

                gap: 8px;

            }

        }

    </style>

</head>



<body>

                    <circle cx="24" cy="24" r="22" stroke="currentColor" stroke-width="2.5" fill="none" />

            <div class="dashboard__stats">

                <div class="stat-card">

                    <div class="stat-card__label">Pendentes</div>

                </div>

                <div class="stat-card">

                    <div class="stat-card__label">Aprovados</div>

                    <div class="stat-card__value stat-card__value--approved" id="statApproved">0</div>

                </div>

                        <button class="filter-tab active" data-filter="all">Todos</button>

                        <button class="filter-tab" data-filter="pending">Pendentes</button>

    <!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>

        // ── Admin Config ──

        const ADMIN_USER = 'admin';

        const ADMIN_PASS = 'laserdent2026';



        const loginScreen = document.getElementById('loginScreen');

        const dashboard = document.getElementById('dashboard');

        const loginForm = document.getElementById('loginForm');

        const loginError = document.getElementById('loginError');

        const logoutBtn = document.getElementById('logoutBtn');



        // Check session

        if (sessionStorage.getItem('laserdent_admin') === 'true') {

            showDashboard();

        }



        loginForm.addEventListener('submit', (e) => {

            e.preventDefault();

            const user = document.getElementById('loginUser').value.trim();

            const pass = document.getElementById('loginPass').value;



            if (user === ADMIN_USER && pass === ADMIN_PASS) {

                sessionStorage.setItem('laserdent_admin', 'true');

                showDashboard();

            } else {

                loginError.classList.add('active');

                setTimeout(() => loginError.classList.remove('active'), 3000);

            }

        });



        logoutBtn.addEventListener('click', () => {

            sessionStorage.removeItem('laserdent_admin');

            loginScreen.style.display = '';

            dashboard.classList.remove('active');

        });



        function showDashboard() {
            fetchTestimonials();

            loginScreen.style.display = 'none';

            dashboard.classList.add('active');

            renderDashboard();

        }



        // ── Testimonials Management ──
// ── Testimonials Management ──
        let currentFilter = 'all';
        let testimonialsData = [];

        async function fetchTestimonials() {
            if (typeof db === 'undefined') return;
            try {
                const snapshot = await db.collection('testimonials').get();
                testimonialsData = [];
                snapshot.forEach(doc => {
                    testimonialsData.push({ id: doc.id, ...doc.data() });
                });
                renderDashboard();
            } catch (e) {
                console.error("Erro ao puxar dados:", e);
                alert("Erro ao conectar no banco de dados.");
            }
        }

        async function updateStatus(docId, newStatus) {
            const validStatuses = ['pending', 'approved', 'rejected'];
            if (!validStatuses.includes(newStatus)) return;
            
            try {
                await db.collection('testimonials').doc(docId).update({
                    status: newStatus
                });
                // Atualiza localmente para resposta rápida na interface
                const item = testimonialsData.find(t => t.id === docId);
                if (item) item.status = newStatus;
                renderDashboard();
            } catch (e) {
                console.error("Erro atualizar:", e);
                alert("Falha ao atualizar o status.");
            }
        }

        async function deleteTestimonial(docId) {
            if(!confirm('Tem certeza que deseja excluir este depoimento permanentemente?')) return;
            try {
                await db.collection('testimonials').doc(docId).delete();
                testimonialsData = testimonialsData.filter(t => t.id !== docId);
                renderDashboard();
            } catch (e) {
                console.error("Erro deletar:", e);
                alert("Falha ao excluir.");
            }
        }

        function renderDashboard() {
            const list     = testimonialsData;
            const pending  = list.filter(t => t.status === 'pending').length;
            const approved = list.filter(t => t.status === 'approved').length;
            const rejected = list.filter(t => t.status === 'rejected').length;

            document.getElementById('statPending').textContent  = pending;
            document.getElementById('statApproved').textContent = approved;
            document.getElementById('statRejected').textContent = rejected;

            const filtered  = currentFilter === 'all' ? list : list.filter(t => t.status === currentFilter);
            const container = document.getElementById('testimonialList');

            if (filtered.length === 0) {
                const label = currentFilter === 'all' ? 'enviado'
                            : currentFilter === 'pending'  ? 'pendente'
                            : currentFilter === 'approved' ? 'aprovado' : 'rejeitado';
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        <p>Nenhum depoimento ${escapeHtml(label)} ainda.</p>
                    </div>
                `;
                return;
            }

            // Ordena com os mais recentes primeiro
            container.innerHTML = filtered.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0)).map(t => {
                // SECURITY: Sanitize ALL user-provided data before DOM insertion
                const safeName   = escapeHtml(t.name  || '');
                const safeEmail  = escapeHtml(t.email || '');
                const safeText   = escapeHtml(t.text  || '');
                const initials   = escapeHtml(
                    (t.name || '').split(' ').map(w => w[0]).filter(Boolean).slice(0, 2).join('').toUpperCase()
                );
                
                // Em vez de parseInt (que quebra ID do Firebase), passamos a string de ID validada apenas internamente
                const safeId = t.id; 
                const date = t.date ? new Date(t.date).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : 'Data desconhecida';
                
                // Extrai as estrelas para o administrador visualizar
                const stars = '★'.repeat(Math.min(Math.max(parseInt(t.stars) || 5, 1), 5));

                const validStatuses = ['pending', 'approved', 'rejected'];
                const safeStatus = validStatuses.includes(t.status) ? t.status : 'pending';
                const statusClass = `testimonial-item__status--${safeStatus}`;
                const statusLabel = safeStatus === 'pending' ? 'Pendente' : safeStatus === 'approved' ? 'Aprovado' : 'Rejeitado';

                let actions = '';
                if (safeStatus === 'pending') {
                    actions = `
                        <button class="btn--action btn--approve" onclick="updateStatus('${safeId}', 'approved')">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                            Aprovar
                        </button>
                        <button class="btn--action btn--reject" onclick="updateStatus('${safeId}', 'rejected')">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                            Rejeitar
                        </button>
                    `;
                } else if (safeStatus === 'approved') {
                    actions = `
                        <button class="btn--action btn--reject" onclick="updateStatus('${safeId}', 'rejected')">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                            Revogar
                        </button>
                        <button class="btn--action btn--delete" onclick="deleteTestimonial('${safeId}')">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                            Excluir
                        </button>
                    `;
                } else {
                    actions = `
                        <button class="btn--action btn--approve" onclick="updateStatus('${safeId}', 'approved')">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                            Aprovar
                        </button>
                        <button class="btn--action btn--delete" onclick="deleteTestimonial('${safeId}')">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                            Excluir
                        </button>
                    `;
                }

                return `
                    <div class="testimonial-item">
                        <div class="testimonial-item__header">
                            <div class="testimonial-item__author">
                                <div class="testimonial-item__avatar">${initials}</div>
                                <div>
                                    <div class="testimonial-item__name">${safeName}</div>
                                    <div class="testimonial-item__email">${safeEmail}</div>
                                </div>
                            </div>
                            <div>
                                <span style="color: #ffb400; font-size: 1.1rem; margin-right: 12px; letter-spacing: 1px;">${stars}</span>
                                <span class="testimonial-item__status ${statusClass}">${statusLabel}</span>
                                <span class="testimonial-item__date">${date}</span>
                            </div>
                        </div>
                        <div class="testimonial-item__text">${safeText}</div>
                        <div class="testimonial-item__actions">${actions}</div>
                    </div>
                `;
            }).join('');
        }

        
// ── Filter Tabs ──

        document.querySelectorAll('.filter-tab').forEach(tab => {

            tab.addEventListener('click', () => {

                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));

                tab.classList.add('active');

                currentFilter = tab.dataset.filter;

                renderDashboard();

            });

        });

    </script>


</body>



</html>
